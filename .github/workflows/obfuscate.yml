name: Obfuscate Worker Outputs

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - '明文源吗'

permissions:
  contents: write

jobs:
  build-and-obfuscate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install obfuscator
        run: npm install javascript-obfuscator

      - name: Obfuscate source and generate worker entry
        run: |
          node <<'EOF'
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const fs = require('fs');
          const path = require('path');

          const sourceFileName = '明文源吗';
          const obfuscatedFileName = '少年你相信光吗';
          const workerEntryFileName = '_worker.js';
          const sourceFilePath = path.join(process.cwd(), sourceFileName);
          const obfuscatedFilePath = path.join(process.cwd(), obfuscatedFileName);
          const workerEntryFilePath = path.join(process.cwd(), workerEntryFileName);

          if (!fs.existsSync(sourceFilePath)) {
            console.error(`Source file not found: ${sourceFilePath}`);
            process.exit(1);
          }

          const originalCode = fs.readFileSync(sourceFilePath, 'utf8');
          if (!originalCode.trim()) {
            console.error(`Source file is empty: ${sourceFileName}`);
            process.exit(1);
          }

          const obfuscationOptions = {
            compact: true,
            controlFlowFlattening: false,
            controlFlowFlatteningThreshold: 0,
            deadCodeInjection: false,
            stringArray: true,
            stringArrayEncoding: ['base64'],
            stringArrayThreshold: 1,
            stringArrayRotate: true,
            stringArrayShuffle: true,
            stringArrayWrappersCount: 2,
            stringArrayWrappersChainedCalls: false,
            stringArrayWrappersParametersMaxCount: 3,
            renameGlobals: true,
            identifierNamesGenerator: 'mangled-shuffled',
            identifierNamesCache: null,
            identifiersPrefix: '',
            renameProperties: false,
            renamePropertiesMode: 'safe',
            ignoreImports: false,
            target: 'browser',
            numbersToExpressions: false,
            simplify: false,
            splitStrings: true,
            splitStringsChunkLength: 1,
            transformObjectKeys: false,
            unicodeEscapeSequence: true,
            selfDefending: false,
            debugProtection: false,
            debugProtectionInterval: 0,
            disableConsoleOutput: true,
            domainLock: []
          };

          const obfuscatedCode = JavaScriptObfuscator
            .obfuscate(originalCode, obfuscationOptions)
            .getObfuscatedCode();

          fs.writeFileSync(obfuscatedFilePath, obfuscatedCode, 'utf8');
          fs.writeFileSync(workerEntryFilePath, obfuscatedCode, 'utf8');

          console.log(`Updated ${obfuscatedFileName} and ${workerEntryFileName}`);
          EOF

      - name: Commit generated outputs
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add '少年你相信光吗' '_worker.js'
          if git diff --staged --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "chore: refresh obfuscated worker outputs"
            git push
          fi
